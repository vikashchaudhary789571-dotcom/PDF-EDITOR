[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "https://pdf-editor-ax8j.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "https://pdf-editor-ax8j.onrender.com/uploads/:splat"
  status = 200

[[redirects]]
  from = "/downloads/*"
  to = "https://pdf-editor-ax8j.onrender.com/downloads/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
